services:
  web:
    image: ocr-karsilastirma:web
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - rapidocr-api
    ports:
      - "3012:3012"
    environment:
      NODE_ENV: production
      PORT: 3012
      # Default: use compose-managed OCR service over the internal Docker network.
      # Override with .env.docker.external if you want to reach an OCR service outside Docker.
      OCR_API_URL: ${OCR_API_URL:-http://rapidocr-api:9005/ocr}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  rapidocr-api:
    image: qingchen0607/rapid-ocr-api:v20250619
    ports:
      - "8099:9005"
    restart: unless-stopped